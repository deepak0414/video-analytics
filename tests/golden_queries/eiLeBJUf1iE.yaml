  - {id: dresses-pos-10, query: "person holding a camera around their neck",   expect: match, time_range: [88, 128]}
  - {id: dresses-neg-01, query: "car driving on a road",                       expect: no_match}
  - {id: dresses-neg-02, query: "dog or pet animal",                           expect: no_match}
  - {id: dresses-neg-03, query: "snowy outdoor winter scene",                  expect: no_match}
  - {id: dresses-neg-04, query: "people eating at a dinner table",             expect: no_match}
  - {id: dresses-neg-05, query: "neon city street at night",                   expect: no_match}

  # --- caption search (Role 4) — ground truth = vision-verified scene content ---
  - {id: dresses-cap-01, query: "women in pink dresses",   modality: caption, expect: match,    time_range: [85, 106], provenance: vision-verified}
  - {id: dresses-cap-02, query: "movieclips logo",         modality: caption, expect: match,    time_range: [131, 159], provenance: vision-verified}  # widened from [150,159]: Qwen captioned the Fandango Movieclips end-card at 137-143s
  - {id: dresses-cap-03, query: "snowy mountain",          modality: caption, expect: no_match, provenance: vision-verified}

  # --- transcript search (Role 8) — dialogue not verifiable from frames, so these
  #     pin the validated Whisper run (regression, not absolute ground truth) ---
  - {id: dresses-tx-01,  query: "twenty seven dresses",    modality: transcript, expect: match, time_range: [120, 135], provenance: model-regression}
  - {id: dresses-tx-02,  query: "theme wedding",           modality: transcript, expect: match, time_range: [8, 20],    provenance: model-regression}
  - {id: dresses-tx-03,  query: "quarterly budget",        modality: transcript, expect: no_match, provenance: model-regression}

  # --- on-screen text (Role 10) — the closing title card is vision-verified.
  #     2026-06-12 rapidocr run: the card reads as separate lines "27" + "DRESSES"
  #     @131-133s — each word hits (0.5), no single hit holds the full phrase.
  - {id: dresses-ocr-01, query: "27 dresses", modality: on_screen_text, expect: match, time_range: [120, 159], provenance: vision-verified}

  # --- object appearances (Role 5) — ground truth = vision-verified ---
  - {id: dresses-obj-01, query: "person",                  modality: object, expect: match,    provenance: vision-verified}
  - {id: dresses-obj-02, query: "car",                     modality: object, expect: no_match, provenance: vision-verified}

  # --- distinct counts (Role 6) — bride+groom+bridesmaids+leads all verified ---
  - {id: dresses-cnt-01, query: "person", modality: object_count, expect: match,
     count_min: 3, count_max: 30, provenance: vision-verified}
  - {id: dresses-cnt-02, query: "car",    modality: object_count, expect: no_match, provenance: vision-verified}

# Ask-level questions (Role 11 + deep scan): asserted against CODE-COUNTED attributes.
ask_questions:
  - id: dresses-ask-01
    question: "the girl in first scene, how many time she changes her dress in the entire video clip?"
    statistic: distinct_states         # changes on montage footage -> distinct outfits
    expected_min: 17
    expected_max: 19
    provenance: human-verified         # user hand-counted 17 changes (= 18 outfits
                                       # incl. the opening one); measured 18-19
    note: >
      Requires the pyscenedetect ingest (.va-shots era, 71 segments) — the
      histogram-segmented copies undercount. Raw transitions (~26) measure the
      montage editing, not the changes.

