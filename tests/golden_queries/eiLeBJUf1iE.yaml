  - {id: dresses-pos-05, query: "bridesmaids in pink dresses",                 expect: match, time_range: [88, 104]}
  - {id: dresses-pos-06, query: "woman in a cowboy hat",                       expect: match, time_range: [104, 120]}
  - {id: dresses-pos-07, query: "women in southern belle hoop skirt gowns",    expect: match, time_range: [24, 40]}
  - {id: dresses-pos-08, query: "woman in a red dress twirling",               expect: match, time_range: [96, 112]}
